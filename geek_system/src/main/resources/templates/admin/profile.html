<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>プロフィール</title>
</head>
<body>
	<h1>プロフィール</h1>
	名前：
	<span th:text="${profile.lastName + ' ' + profile.firstName}"></span>
	<br>
	メール：
	<span th:text="${profile.email}"></span>
	<br>
	役職：
	<span th:text="${profile.post}"></span>
	<br>
	権限：
	<span th:text="${profile.authority}"></span>
	<br>
	電話番号：
	<span th:text="${profile.phone_number}"></span>
	<br>
</body>
</html>
