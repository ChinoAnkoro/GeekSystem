<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>
	<div th:replace="common/header :: header"></div>
	<h1>プロフィール編集</h1>

	<div th:if="${#fields.hasErrors('*')}">
		<ul>
			<li th:each="e : ${#fields.errors('*')}" th:text="${e}"></li>
		</ul>
	</div>
	<form th:action="@{/admin/profile/update}" th:object="${form}" method="post">

		<div>
			<label>姓</label><br>
			<input type="text" th:field="*{lastName}">
			<div th:errors="*{lastName}"></div>
		</div>

		<div>
			<label>名</label><br>
			<input type="text" th:field="*{firstName}">
			<div th:errors="*{firstName}"></div>
		</div>

		<div>
			<label>メール</label><br>
			<input type="text" th:field="*{email}" readonly>
			<div th:errors="*{email}"></div>
		</div>

		<div>
			<label>役職</label><br>
			<select th:field="*{post}">
				<option value="">選択してください</option>
				<option th:each="p : ${postList}" th:value="${p}" th:text="${p}">
				</option>
			</select>
			<div th:errors="*{post}"></div>
		</div>

		<div>
			<label>権限</label><br>
			<div th:each="a : ${authorityList}">
				<label>
					<input type="checkbox" th:field="*{authority}" th:value="${a}">
					<span th:text="${a}"></span>
				</label>
			</div>
			<div th:errors="*{authority}"></div>
		</div>

		<div>
			<label>電話番号</label><br>
			<input type="text" th:field="*{phone_number}">
			<div th:errors="*{phone_number}"></div>
		</div>

		<br>

		<button type="submit">更新</button>

	</form>

	<br>

</body>

</html>
